<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechPulse — AI & Technology News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    /* ── TOKENS ─────────────────────────────────────────────────────── */
    :root {
      --bg:          #0d0f14;
      --surface:     #13161e;
      --surface-2:   #1a1e29;
      --border:      #252836;
      --text:        #e8e4dc;
      --muted:       #7a7d8a;
      --accent:      #e8a020;
      --accent-dim:  #c4851a;
      --ai:          #4f9cf9;
      --market:      #34c98e;
      --cyber:       #e05a5a;
      --devices:     #a78bfa;
      --font-serif:  "Playfair Display", Georgia, serif;
      --font-sans:   "IBM Plex Sans", system-ui, sans-serif;
      --font-mono:   "IBM Plex Mono", monospace;
      --radius:      6px;
      --transition:  0.18s ease;
    }

    /* ── RESET ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-weight: 300;
      line-height: 1.65;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    /* ── NOISE OVERLAY ──────────────────────────────────────────────── */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ─────────────────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13, 15, 20, 0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 40px;
      height: 64px;
    }

    .logo {
      font-family: var(--font-serif);
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--text);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .logo span { color: var(--accent); }

    /* ── NAV TABS ───────────────────────────────────────────────────── */
    nav {
      display: flex;
      gap: 2px;
      overflow-x: auto;
      scrollbar-width: none;
      flex: 1;
    }
    nav::-webkit-scrollbar { display: none; }

    nav button {
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 8px 14px;
      border-radius: var(--radius);
      transition: color var(--transition), background var(--transition);
      white-space: nowrap;
      position: relative;
    }

    nav button:hover { color: var(--text); background: var(--surface); }

    nav button.active {
      color: var(--text);
      background: var(--surface-2);
    }

    nav button.active::after {
      content: "";
      position: absolute;
      bottom: -1px;
      left: 14px;
      right: 14px;
      height: 2px;
      background: var(--accent);
      border-radius: 2px 2px 0 0;
    }

    /* ── LIVE INDICATOR ─────────────────────────────────────────────── */
    .live-badge {
      margin-left: auto;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── MAIN LAYOUT ────────────────────────────────────────────────── */
    main {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── PAGE TITLE ─────────────────────────────────────────────────── */
    .page-header {
      margin-bottom: 36px;
      animation: fadeUp 0.4s ease both;
    }

    .page-title {
      font-family: var(--font-serif);
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: var(--text);
    }

    .page-subtitle {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
      font-family: var(--font-mono);
      letter-spacing: 0.04em;
    }

    /* ── ARTICLE GRID ───────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    /* ── ARTICLE CARD ───────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      cursor: pointer;
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: fadeUp 0.4s ease both;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: var(--accent-dim);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .card-category {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 99px;
      align-self: flex-start;
    }

    .cat-ai      { background: rgba(79,156,249,0.12); color: var(--ai);      border: 1px solid rgba(79,156,249,0.25); }
    .cat-market  { background: rgba(52,201,142,0.12); color: var(--market);  border: 1px solid rgba(52,201,142,0.25); }
    .cat-cyber   { background: rgba(224,90,90,0.12);  color: var(--cyber);   border: 1px solid rgba(224,90,90,0.25); }
    .cat-devices { background: rgba(167,139,250,0.12);color: var(--devices); border: 1px solid rgba(167,139,250,0.25); }

    .card-title {
      font-family: var(--font-serif);
      font-size: 17px;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: -0.01em;
      color: var(--text);
      transition: color var(--transition);
    }

    .card:hover .card-title { color: var(--accent); }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      margin-top: auto;
    }

    .card-meta .sep { color: var(--border); }

    /* ── EMPTY STATE ────────────────────────────────────────────────── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 13px;
    }

    /* ── ARTICLE DETAIL VIEW ────────────────────────────────────────── */
    #article-view {
      display: none;
      animation: fadeUp 0.3s ease both;
    }

    #article-view.visible { display: block; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 14px;
      margin-bottom: 36px;
      transition: color var(--transition), border-color var(--transition);
    }

    .back-btn:hover { color: var(--text); border-color: var(--muted); }

    .article-header {
      margin-bottom: 36px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }

    .article-category-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 99px;
      display: inline-block;
      margin-bottom: 16px;
    }

    .article-title {
      font-family: var(--font-serif);
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 20px;
    }

    .article-byline {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 20px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
    }

    .article-byline span { display: flex; align-items: center; gap: 6px; }
    .byline-label { color: var(--border); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; }

    /* ── SUMMARY BODY (markdown rendered) ──────────────────────────── */
    .article-body {
      max-width: 720px;
      font-size: 16px;
      line-height: 1.75;
    }

    .article-body strong {
      font-weight: 500;
      color: var(--text);
    }

    .article-body em {
      color: var(--muted);
      font-style: normal;
    }

    .article-body p {
      margin-bottom: 16px;
      color: #c5c1b8;
    }

    .article-body ul, .article-body ol {
      padding-left: 20px;
      margin-bottom: 16px;
      color: #c5c1b8;
    }

    .article-body li {
      margin-bottom: 8px;
      padding-left: 4px;
    }

    .article-body li::marker {
      color: var(--accent);
    }

    .article-body h2, .article-body h3 {
      font-family: var(--font-sans);
      font-weight: 500;
      font-size: 15px;
      letter-spacing: 0.02em;
      color: var(--muted);
      text-transform: uppercase;
      margin: 28px 0 12px;
    }

    /* ── SOURCE LINK BOX ────────────────────────────────────────────── */
    .source-box {
      margin-top: 40px;
      padding: 20px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .source-box-meta {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .source-box-meta strong { color: var(--text); font-weight: 500; }

    .read-original {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--accent);
      border: 1px solid var(--accent-dim);
      border-radius: var(--radius);
      padding: 9px 16px;
      transition: background var(--transition), color var(--transition);
      white-space: nowrap;
    }

    .read-original:hover {
      background: rgba(232,160,32,0.1);
    }

    /* ── LOADING / ERROR ────────────────────────────────────────────── */
    #loading, #error-msg {
      text-align: center;
      padding: 100px 24px;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--muted);
    }

    #loading .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ─────────────────────────────────────────────────────── */
    footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* ── ANIMATIONS ─────────────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:nth-child(1)  { animation-delay: 0.03s; }
    .card:nth-child(2)  { animation-delay: 0.06s; }
    .card:nth-child(3)  { animation-delay: 0.09s; }
    .card:nth-child(4)  { animation-delay: 0.12s; }
    .card:nth-child(5)  { animation-delay: 0.15s; }
    .card:nth-child(6)  { animation-delay: 0.18s; }
    .card:nth-child(7)  { animation-delay: 0.21s; }
    .card:nth-child(8)  { animation-delay: 0.24s; }
    .card:nth-child(9)  { animation-delay: 0.27s; }
    .card:nth-child(10) { animation-delay: 0.30s; }

    /* ── RESPONSIVE ─────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .header-inner { gap: 16px; }
      .live-badge   { display: none; }
      main          { padding: 32px 16px 60px; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────────────── -->
<header>
  <div class="header-inner">
    <div class="logo">Tech<span>Pulse</span></div>
    <nav id="nav">
      <button class="active" data-tab="all">All</button>
      <button data-tab="ai">Artificial Intelligence</button>
      <button data-tab="market">Tech Business</button>
      <button data-tab="cyber">Cybersecurity</button>
      <button data-tab="devices">Laptops &amp; Phones</button>
    </nav>
    <div class="live-badge">
      <div class="live-dot"></div>
      <span>AUTO-UPDATED</span>
    </div>
  </div>
</header>

<!-- ── MAIN ────────────────────────────────────────────────────────── -->
<main id="main">

  <!-- Loading state -->
  <div id="loading">
    <div class="spinner"></div>
    Fetching articles…
  </div>

  <!-- Error state -->
  <div id="error-msg" style="display:none;">
    Could not load articles.json — make sure the pipeline has run at least once.
  </div>

  <!-- List view -->
  <div id="list-view" style="display:none;">
    <div class="page-header">
      <h1 class="page-title" id="page-title">Latest</h1>
      <p class="page-subtitle" id="page-subtitle"></p>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <!-- Article detail view -->
  <div id="article-view">
    <button class="back-btn" id="back-btn">← Back</button>
    <div class="article-header">
      <div class="article-category-badge" id="art-badge"></div>
      <h1 class="article-title" id="art-title"></h1>
      <div class="article-byline" id="art-byline"></div>
    </div>
    <div class="article-body" id="art-body"></div>
    <div class="source-box" id="art-source-box">
      <div class="source-box-meta" id="art-source-meta"></div>
      <a class="read-original" id="art-link" target="_blank" rel="noopener">
        Read original ↗
      </a>
    </div>
  </div>

</main>

<!-- ── FOOTER ──────────────────────────────────────────────────────── -->
<footer>
  TechPulse — Summaries generated by AI · Updated every 12 hours
</footer>

<!-- ── APP ─────────────────────────────────────────────────────────── -->
<script>
  // ── Category config ──────────────────────────────────────────────
  const TABS = {
    all:     { label: "Latest News",             filter: null },
    ai:      { label: "Artificial Intelligence", filter: "Artificial Intelligence" },
    market:  { label: "Tech Business & Markets", filter: "Tech Business & Markets" },
    cyber:   { label: "Cybersecurity",           filter: "Cybersecurity" },
    devices: { label: "Laptops & Cell Phones",   filter: "Laptops & Cell Phones" },
  };

  const CAT_CLASS = {
    "Artificial Intelligence": "cat-ai",
    "Tech Business & Markets": "cat-market",
    "Cybersecurity":           "cat-cyber",
    "Laptops & Cell Phones":   "cat-devices",
  };

  // ── State ────────────────────────────────────────────────────────
  let allArticles = [];
  let currentTab  = "all";

  // ── Elements ─────────────────────────────────────────────────────
  const $loading     = document.getElementById("loading");
  const $error       = document.getElementById("error-msg");
  const $listView    = document.getElementById("list-view");
  const $articleView = document.getElementById("article-view");
  const $grid        = document.getElementById("grid");
  const $pageTitle   = document.getElementById("page-title");
  const $pageSub     = document.getElementById("page-subtitle");
  const $navBtns     = document.querySelectorAll("nav button");
  const $backBtn     = document.getElementById("back-btn");

  // ── Fetch data ───────────────────────────────────────────────────
  async function init() {
    try {
      const res = await fetch("articles.json");
      if (!res.ok) throw new Error(res.status);
      allArticles = await res.json();
      $loading.style.display = "none";
      renderTab(currentTab);
    } catch (e) {
      $loading.style.display = "none";
      $error.style.display   = "block";
      console.error("Failed to load articles.json", e);
    }
  }

  // ── Nav ──────────────────────────────────────────────────────────
  $navBtns.forEach(btn => {
    btn.addEventListener("click", () => {
      currentTab = btn.dataset.tab;
      $navBtns.forEach(b => b.classList.toggle("active", b === btn));
      showListView();
      renderTab(currentTab);
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  });

  $backBtn.addEventListener("click", () => {
    showListView();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });

  // ── Views ────────────────────────────────────────────────────────
  function showListView() {
    $listView.style.display    = "block";
    $articleView.classList.remove("visible");
    $articleView.style.display = "none";
  }

  function showArticleView() {
    $listView.style.display    = "none";
    $articleView.style.display = "block";
    // Trigger animation
    void $articleView.offsetWidth;
    $articleView.classList.add("visible");
  }

  // ── Render tab ───────────────────────────────────────────────────
  function renderTab(tab) {
    const cfg    = TABS[tab];
    const filter = cfg.filter;
    const arts   = filter ? allArticles.filter(a => a.category === filter) : allArticles;

    $pageTitle.textContent = cfg.label;
    $pageSub.textContent   = `${arts.length} article${arts.length !== 1 ? "s" : ""}`;

    $grid.innerHTML = "";

    if (!arts.length) {
      $grid.innerHTML = '<div class="empty">No articles in this category yet.</div>';
      return;
    }

    arts.forEach((article, idx) => {
      const card = document.createElement("div");
      card.className = "card";
      card.style.animationDelay = `${Math.min(idx, 9) * 30}ms`;

      const catClass = CAT_CLASS[article.category] || "cat-ai";
      const author   = article.author || "Unknown";
      const source   = article.source || "Unknown";

      card.innerHTML = `
        <span class="card-category ${catClass}">${esc(article.category || "News")}</span>
        <div class="card-title">${esc(article.title || "Untitled")}</div>
        <div class="card-meta">
          <span>${esc(author)}</span>
          <span class="sep">·</span>
          <span>${esc(source)}</span>
        </div>
      `;

      card.addEventListener("click", () => openArticle(article));
      $grid.appendChild(card);
    });
  }

  // ── Open article ─────────────────────────────────────────────────
  function openArticle(article) {
    const catClass = CAT_CLASS[article.category] || "cat-ai";

    // Badge
    const badge = document.getElementById("art-badge");
    badge.textContent = article.category || "News";
    badge.className = `article-category-badge ${catClass}`;

    // Title
    document.getElementById("art-title").textContent = article.title || "Untitled";

    // Byline
    const byline = document.getElementById("art-byline");
    byline.innerHTML = `
      <span><span class="byline-label">By</span> ${esc(article.author || "Unknown")}</span>
      <span><span class="byline-label">Source</span> ${esc(article.source || "Unknown")}</span>
    `;

    // Summary body — render markdown
    const body = document.getElementById("art-body");
    const rawSummary = article.summary || "_No summary available._";
    body.innerHTML = marked.parse(rawSummary);

    // Source box
    const sourceMeta = document.getElementById("art-source-meta");
    sourceMeta.innerHTML = `
      <span><strong>${esc(article.source || "Unknown")}</strong></span>
      <span>Published by ${esc(article.author || "Unknown")}</span>
    `;

    const link = document.getElementById("art-link");
    link.href = article.url || "#";

    showArticleView();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  // ── Util ─────────────────────────────────────────────────────────
  function esc(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // ── Boot ─────────────────────────────────────────────────────────
  init();
</script>
</body>
</html>
